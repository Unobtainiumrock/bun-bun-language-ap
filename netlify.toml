[build]
  # Build command for your React app
  command = "npm run build"
  
  # Directory where your built app will be
  publish = "dist"
  
  # Directory where your Netlify Functions are located
  functions = "netlify/functions"
  
  # Function timeout (max 26 seconds on free tier)
  functions_timeout = 26

[build.environment]
  # Environment variables for build process
  NODE_VERSION = "18"

# Function configuration
[functions]
  # Directory for functions
  directory = "netlify/functions"

# Local development settings
[dev]
  # Local development command - runs Vite
  command = "npm run dev"
  
  # Main port you'll use to access the app (Netlify proxy)
  port = 8888
  
  # Port for Netlify Functions (must differ from main port)
  functionsPort = 9999
  
  # Tell Netlify to target Vite's port
  targetPort = 5173

# Pass through Vite dev server paths (must come before SPA catch-all)
[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/@*"
  to = "/@:splat"
  status = 200
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200
  force = true

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin" 